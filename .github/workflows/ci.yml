name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install Deps
        run: poetry install --with dev
        working-directory: apps/api
      - name: Ruff
        run: poetry run ruff check .
        working-directory: apps/api
      - name: Pytest
        run: poetry run pytest
        working-directory: apps/api

  schema-drift:
    # Regenerate the TS types from the FastAPI OpenAPI schema and fail if the
    # committed schema.gen.ts is stale — keeps the frontend types in lockstep
    # with the Pydantic schemas (run `pnpm gen:api` to refresh).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install API Deps
        run: poetry install --with dev
        working-directory: apps/api
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install web deps
        run: pnpm install --frozen-lockfile
      - name: Regenerate API types
        run: pnpm gen:api
        working-directory: apps/web
      - name: Fail if generated types are stale
        run: |
          if ! git diff --exit-code -- src/lib/api-types/schema.gen.ts; then
            echo "::error::src/lib/api-types/schema.gen.ts is out of date. Run 'pnpm gen:api' in apps/web and commit the result."
            exit 1
          fi
        working-directory: apps/web

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [web, api]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: looplm-web
            dockerfile: infra/docker/Dockerfile.web
          - image: looplm-api
            dockerfile: infra/docker/Dockerfile.api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: timtres/${{ matrix.image }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LOOPLM_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
