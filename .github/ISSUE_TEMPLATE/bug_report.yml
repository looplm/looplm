name: Bug Report
description: Report a problem or regression
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for filing a bug report. Please be as specific as possible."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste logs or screenshots if available.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / Commit
      placeholder: e.g. v0.1.0 or commit SHA
    validations:
      required: false
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: OS, Node, Python, Docker versions
    validations:
      required: false
